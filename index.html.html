<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My COMPanion</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        ios: {
                            bg: '#F8F9FB',
                            card: '#FFFFFF',
                            text: '#1D1D1F',
                            subtext: '#86868B',
                            blue: '#007AFF',
                            purple: '#AF52DE',
                            green: '#34C759',
                            red: '#FF3B30',
                            orange: '#FF9500',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', '-apple-system', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #F8F9FB;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Inter', sans-serif;
            letter-spacing: -0.01em;
            color: #1D1D1F;
        }
        
        .app-title-gradient {
            font-family: 'Inter', sans-serif;
            font-weight: 900;
            letter-spacing: -0.05em;
            background: linear-gradient(135deg, #007AFF 0%, #AF52DE 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.1;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        
        .progress-ring {
            transition: stroke-dashoffset 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        .card-shadow {
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.04);
        }

        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .nav-active {
            color: #007AFF;
            transform: scale(1.1);
        }

        /* Custom scrollbar hide */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const Icons = {
            Home: () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
            Reminders: () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>,
            Calendar: () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,
            Check: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
            Plus: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
            Trash: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
            ChevronRight: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M9 18l6-6-6-6"/></svg>
        };

        const App = () => {
            const [view, setView] = useState('welcome');
            
            // --- STATE: HABITS ---
            const [habits, setHabits] = useState([
                { id: 1, name: "Drink 2L Water", done: false },
                { id: 2, name: "Morning Stretch", done: true },
                { id: 3, name: "Read for 15 mins", done: false }
            ]);
            const [habitInput, setHabitInput] = useState("");

            // --- STATE: REMINDERS ---
            const [reminders, setReminders] = useState([
                { id: 1, text: "Call Mom", done: false },
                { id: 2, text: "Grocery shopping", done: false }
            ]);
            const [reminderInput, setReminderInput] = useState("");

            // --- STATE: CALENDAR ---
            const [selectedDate, setSelectedDate] = useState(new Date().getDate());
            const [events, setEvents] = useState({
                8: [{ id: 101, title: "Doctor Appointment", time: "10:30 AM" }],
                15: [{ id: 102, title: "Project Launch", time: "2:00 PM" }]
            });
            const [eventInput, setEventInput] = useState("");

            const habitStats = useMemo(() => {
                const done = habits.filter(h => h.done).length;
                return { done, total: habits.length, pct: habits.length ? Math.round((done/habits.length)*100) : 0 };
            }, [habits]);

            const daysInMonth = 30; // Mock for current month

            if (view === 'welcome') return (
                <div className="h-screen flex flex-col items-center justify-center bg-white px-10 text-center fade-in">
                    <div className="mb-10 w-24 h-24 bg-gradient-to-br from-ios-blue to-ios-purple rounded-[28%] shadow-2xl flex items-center justify-center text-white text-5xl transform rotate-3">
                        <Icons.Check />
                    </div>
                    <h1 className="text-[52px] app-title-gradient mb-4">My COMPanion</h1>
                    <p className="text-ios-subtext text-lg mb-12 px-4 font-medium leading-relaxed">Your world, organized and centered.</p>
                    <button onClick={() => setView('home')} className="w-full bg-ios-text text-white py-5 rounded-[22px] font-bold text-xl active:scale-95 transition-all shadow-xl">
                        Open Dashboard
                    </button>
                </div>
            );

            return (
                <div className="min-h-screen bg-ios-bg pb-32">
                    <div className="max-w-md mx-auto px-6 pt-12">
                        
                        {/* HOME VIEW */}
                        {view === 'home' && (
                            <div className="fade-in">
                                <h1 className="text-[36px] font-extrabold mb-8 tracking-tight">Dashboard</h1>
                                
                                <div className="bg-white rounded-[32px] p-6 card-shadow mb-6 flex items-center justify-between">
                                    <div className="space-y-1">
                                        <p className="text-[11px] font-black text-ios-subtext uppercase tracking-widest">Habit Progress</p>
                                        <h2 className="text-3xl font-extrabold text-ios-text">{habitStats.pct}%</h2>
                                        <p className="text-sm text-ios-subtext font-semibold">{habitStats.done} of {habitStats.total} reached</p>
                                    </div>
                                    <div className="relative w-16 h-16">
                                        <svg className="w-full h-full" viewBox="0 0 36 36">
                                            <circle cx="18" cy="18" r="16" fill="none" stroke="#F2F2F7" strokeWidth="4"></circle>
                                            <circle cx="18" cy="18" r="16" fill="none" stroke="url(#grad1)" strokeWidth="4" strokeDasharray="100 100" strokeDashoffset={100 - habitStats.pct} strokeLinecap="round" className="progress-ring"></circle>
                                            <defs>
                                                <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                                                    <stop offset="0%" stopColor="#007AFF" />
                                                    <stop offset="100%" stopColor="#AF52DE" />
                                                </linearGradient>
                                            </defs>
                                        </svg>
                                    </div>
                                </div>

                                <div className="grid grid-cols-2 gap-4">
                                    <button onClick={() => setView('reminders')} className="bg-white p-5 rounded-[28px] card-shadow text-left active:scale-95 transition-transform">
                                        <div className="w-10 h-10 rounded-full bg-ios-orange/10 text-ios-orange flex items-center justify-center mb-3"><Icons.Reminders /></div>
                                        <p className="text-[10px] font-black text-ios-subtext uppercase tracking-widest">Tasks</p>
                                        <h4 className="text-xl font-extrabold">{reminders.filter(r => !r.done).length} Pending</h4>
                                    </button>
                                    <button onClick={() => setView('calendar')} className="bg-white p-5 rounded-[28px] card-shadow text-left active:scale-95 transition-transform">
                                        <div className="w-10 h-10 rounded-full bg-ios-blue/10 text-ios-blue flex items-center justify-center mb-3"><Icons.Calendar /></div>
                                        <p className="text-[10px] font-black text-ios-subtext uppercase tracking-widest">Next Event</p>
                                        <h4 className="text-xl font-extrabold">{events[selectedDate]?.[0]?.time || "Free day"}</h4>
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* REMINDERS VIEW */}
                        {view === 'reminders' && (
                            <div className="fade-in">
                                <h1 className="text-[36px] font-extrabold mb-8 tracking-tight">Reminders</h1>
                                <div className="flex gap-3 mb-6">
                                    <input 
                                        value={reminderInput} 
                                        onChange={(e) => setReminderInput(e.target.value)}
                                        placeholder="I need to..." 
                                        className="flex-1 bg-white rounded-[20px] px-5 py-4 card-shadow outline-none text-sm font-semibold"
                                    />
                                    <button 
                                        onClick={() => {if(reminderInput) setReminders([...reminders, {id: Date.now(), text: reminderInput, done: false}]); setReminderInput("");}}
                                        className="bg-ios-blue text-white p-4 rounded-[20px] shadow-lg active:scale-90"
                                    ><Icons.Plus /></button>
                                </div>
                                <div className="space-y-3">
                                    {reminders.map(r => (
                                        <div key={r.id} className="bg-white p-5 rounded-[24px] card-shadow flex items-center justify-between group">
                                            <div className="flex items-center gap-4">
                                                <button 
                                                    onClick={() => setReminders(reminders.map(i => i.id === r.id ? {...i, done: !i.done} : i))}
                                                    className={`w-6 h-6 rounded-full border-2 flex items-center justify-center transition-all ${r.done ? 'bg-ios-blue border-ios-blue' : 'border-gray-200'}`}
                                                >
                                                    {r.done && <div className="text-white scale-50"><Icons.Check /></div>}
                                                </button>
                                                <span className={`text-[15px] font-bold ${r.done ? 'text-ios-subtext line-through' : 'text-ios-text'}`}>{r.text}</span>
                                            </div>
                                            <button onClick={() => setReminders(reminders.filter(i => i.id !== r.id))} className="text-ios-red/20 hover:text-ios-red"><Icons.Trash /></button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* CALENDAR VIEW */}
                        {view === 'calendar' && (
                            <div className="fade-in">
                                <h1 className="text-[36px] font-extrabold mb-8 tracking-tight">Calendar</h1>
                                <div className="bg-white rounded-[32px] p-6 card-shadow mb-6">
                                    <div className="flex justify-between items-center mb-6">
                                        <h3 className="font-extrabold text-lg">April 2024</h3>
                                        <div className="flex gap-4 text-ios-blue font-bold text-sm">
                                            <span>Prev</span><span>Next</span>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-7 gap-2 text-center text-[10px] font-black text-ios-subtext mb-4">
                                        {['S','M','T','W','T','F','S'].map(d => <div key={d}>{d}</div>)}
                                    </div>
                                    <div className="grid grid-cols-7 gap-2 text-center">
                                        {[...Array(daysInMonth)].map((_, i) => {
                                            const day = i + 1;
                                            const hasEvent = events[day];
                                            return (
                                                <button 
                                                    key={i} 
                                                    onClick={() => setSelectedDate(day)}
                                                    className={`relative py-3 text-xs font-bold rounded-xl transition-all ${selectedDate === day ? 'bg-ios-blue text-white shadow-lg scale-110 z-10' : 'text-ios-text hover:bg-ios-bg'}`}
                                                >
                                                    {day}
                                                    {hasEvent && <div className={`absolute bottom-1 left-1/2 -translate-x-1/2 w-1 h-1 rounded-full ${selectedDate === day ? 'bg-white' : 'bg-ios-blue'}`}></div>}
                                                </button>
                                            );
                                        })}
                                    </div>
                                </div>

                                <div className="space-y-4">
                                    <div className="flex justify-between items-end px-2">
                                        <h4 className="font-black text-ios-subtext text-[10px] uppercase tracking-widest">Events for April {selectedDate}</h4>
                                        <button onClick={() => {
                                            const title = prompt("Event Title:");
                                            const time = prompt("Event Time (e.g. 2:00 PM):");
                                            if(title && time) {
                                                setEvents({...events, [selectedDate]: [...(events[selectedDate] || []), {id: Date.now(), title, time}]});
                                            }
                                        }} className="text-ios-blue text-xs font-bold">+ Add Event</button>
                                    </div>
                                    
                                    {(events[selectedDate] || []).length > 0 ? (
                                        events[selectedDate].map(ev => (
                                            <div key={ev.id} className="bg-white p-5 rounded-[24px] card-shadow flex items-center justify-between fade-in border-l-4 border-ios-blue">
                                                <div>
                                                    <p className="text-xs font-black text-ios-blue mb-0.5">{ev.time}</p>
                                                    <p className="font-bold text-ios-text">{ev.title}</p>
                                                </div>
                                                <button onClick={() => setEvents({...events, [selectedDate]: events[selectedDate].filter(e => e.id !== ev.id)})} className="text-ios-red/20"><Icons.Trash /></button>
                                            </div>
                                        ))
                                    ) : (
                                        <div className="bg-ios-bg border-2 border-dashed border-gray-200 p-8 rounded-[24px] text-center">
                                            <p className="text-ios-subtext text-sm font-medium">No events scheduled.</p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* HABITS VIEW */}
                        {view === 'habits' && (
                            <div className="fade-in">
                                <div className="flex justify-between items-center mb-8">
                                    <h1 className="text-[36px] font-extrabold tracking-tight">Daily Habits</h1>
                                    <div className="w-12 h-12 rounded-2xl bg-ios-purple/10 text-ios-purple flex items-center justify-center font-black text-sm">
                                        {habitStats.pct}%
                                    </div>
                                </div>

                                <div className="flex gap-3 mb-8">
                                    <input 
                                        value={habitInput} 
                                        onChange={(e) => setHabitInput(e.target.value)}
                                        placeholder="New daily habit..." 
                                        className="flex-1 bg-white rounded-[20px] px-5 py-4 card-shadow outline-none text-sm font-semibold"
                                    />
                                    <button 
                                        onClick={() => {if(habitInput) setHabits([...habits, {id: Date.now(), name: habitInput, done: false}]); setHabitInput("");}}
                                        className="bg-ios-purple text-white p-4 rounded-[20px] shadow-lg"
                                    ><Icons.Plus /></button>
                                </div>

                                <div className="space-y-4">
                                    {habits.map(h => (
                                        <div 
                                            key={h.id} 
                                            onClick={() => setHabits(habits.map(item => item.id === h.id ? {...item, done: !item.done} : item))}
                                            className={`bg-white p-5 rounded-[24px] card-shadow flex items-center justify-between cursor-pointer transition-all active:scale-95 ${h.done ? 'opacity-70' : ''}`}
                                        >
                                            <div className="flex items-center gap-5">
                                                <div className={`w-9 h-9 rounded-full border-2 flex items-center justify-center transition-all ${h.done ? 'bg-gradient-to-br from-ios-blue to-ios-purple border-transparent shadow-md' : 'border-gray-100 bg-ios-bg'}`}>
                                                    {h.done && <div className="text-white scale-75"><Icons.Check /></div>}
                                                </div>
                                                <span className={`text-[16px] font-bold tracking-tight ${h.done ? 'text-ios-subtext line-through' : 'text-ios-text'}`}>{h.name}</span>
                                            </div>
                                            <button 
                                                onClick={(e) => { e.stopPropagation(); setHabits(habits.filter(i => i.id !== h.id)); }} 
                                                className="text-ios-red/20 hover:text-ios-red p-2"
                                            ><Icons.Trash /></button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                    </div>

                    {/* NAVIGATION */}
                    <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] max-w-sm glass-panel rounded-[32px] border border-white/20 py-4 px-6 flex justify-between z-50 shadow-2xl">
                        <button onClick={() => setView('home')} className={`flex flex-col items-center transition-all ${view === 'home' ? 'nav-active' : 'text-ios-subtext opacity-60'}`}>
                            <Icons.Home /><span className="text-[9px] mt-1.5 font-black uppercase tracking-widest">Home</span>
                        </button>
                        <button onClick={() => setView('reminders')} className={`flex flex-col items-center transition-all ${view === 'reminders' ? 'nav-active' : 'text-ios-subtext opacity-60'}`}>
                            <Icons.Reminders /><span className="text-[9px] mt-1.5 font-black uppercase tracking-widest">Tasks</span>
                        </button>
                        <button onClick={() => setView('calendar')} className={`flex flex-col items-center transition-all ${view === 'calendar' ? 'nav-active' : 'text-ios-subtext opacity-60'}`}>
                            <Icons.Calendar /><span className="text-[9px] mt-1.5 font-black uppercase tracking-widest">Date</span>
                        </button>
                        <button onClick={() => setView('habits')} className={`flex flex-col items-center transition-all ${view === 'habits' ? 'nav-active' : 'text-ios-subtext opacity-60'}`}>
                            <div className="scale-90"><Icons.Check /></div><span className="text-[9px] mt-1.5 font-black uppercase tracking-widest">Goals</span>
                        </button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
